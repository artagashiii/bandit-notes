<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="notebook-container">
     <div id="navbar" class="sidebar"></div>

    <main class="page-content">
    <h1 style="border-bottom: 5px solid rgba(127, 255, 212, 0.265); padding-bottom: 10px;">What on God's green earth is SSH?</h1>
    <p>This, rightfully was my question when the first level said to use SSH to login the game. <br>
    </p>
  </main>
  </div>
</body>
<script>
  // "../" moves up out of the pages folder so it can see the components folder
  fetch('../components/navbar.html')
    .then(res => {
      if (!res.ok) throw new Error("Navbar file not found");
      return res.text();
    })
    .then(data => {
      document.getElementById('navbar').innerHTML = data;
    })
    .catch(err => console.error(err));
</script>
</html>
